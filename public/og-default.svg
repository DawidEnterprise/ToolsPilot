<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="50%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle glow behind content -->
  <ellipse cx="400" cy="280" rx="500" ry="300" fill="url(#glow)"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#accent)"/>

  <!-- Lightning bolt icon -->
  <g transform="translate(80, 120)">
    <rect width="90" height="90" rx="20" fill="url(#accent)"/>
    <path d="M54 16L30 50h16l-3 22L66 40H50z" fill="white"/>
  </g>

  <!-- Title -->
  <text x="190" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="800" fill="white">ToolsPilot</text>

  <!-- Subtitle -->
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="600" fill="#e2e8f0">100+ Free Browser-Based Tools</text>
  <text x="80" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#94a3b8">No signup · No uploads · 100% private</text>

  <!-- Category pills -->
  <g transform="translate(80, 350)">
    <rect width="160" height="42" rx="21" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="80" y="27" font-family="system-ui, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">🖼️ Image Tools</text>
  </g>
  <g transform="translate(260, 350)">
    <rect width="180" height="42" rx="21" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="90" y="27" font-family="system-ui, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">🛠️ Developer Tools</text>
  </g>
  <g transform="translate(460, 350)">
    <rect width="160" height="42" rx="21" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="80" y="27" font-family="system-ui, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">📝 Text Tools</text>
  </g>
  <g transform="translate(640, 350)">
    <rect width="155" height="42" rx="21" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="78" y="27" font-family="system-ui, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">🔍 SEO Tools</text>
  </g>
  <g transform="translate(815, 350)">
    <rect width="170" height="42" rx="21" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
    <text x="85" y="27" font-family="system-ui, sans-serif" font-size="16" fill="#93c5fd" text-anchor="middle">📁 File Converters</text>
  </g>

  <!-- Popular tools row -->
  <text x="80" y="452" font-family="system-ui, sans-serif" font-size="20" fill="#64748b">
    PNG to JPG · JSON Formatter · Image Compressor · Regex Tester · Word Counter
  </text>
  <text x="80" y="486" font-family="system-ui, sans-serif" font-size="20" fill="#64748b">
    QR Code Generator · Color Converter · Meta Tag Generator · and many more
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="545" width="1200" height="85" fill="#0c1322" opacity="0.6"/>

  <!-- URL -->
  <text x="80" y="598" font-family="system-ui, sans-serif" font-size="26" font-weight="600" fill="#3b82f6">toolspilot.dev</text>

  <!-- Free badge -->
  <rect x="980" y="568" width="140" height="44" rx="22" fill="url(#accent)"/>
  <text x="1050" y="597" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="white" text-anchor="middle">100% FREE</text>
</svg>
