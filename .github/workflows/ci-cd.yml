# ──────────────────────────────────────────────────────────
# CI/CD Pipeline — Build, Test & Deploy to Azure Static Web Apps
# ──────────────────────────────────────────────────────────
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"

permissions:
  contents: read
  id-token: write

jobs:
  # ─── Lint & Test ───────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

  # ─── Build & Deploy Static Web App ───────────────────
  build-and-deploy:
    name: Build & Deploy
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://toolspilot.dev
          NEXT_PUBLIC_SITE_NAME: ToolsPilot
          NEXT_PUBLIC_ADSENSE_CLIENT_ID: ca-pub-5256644690303885
          NEXT_PUBLIC_GA_MEASUREMENT_ID: G-25TYF21P27
      - name: Deploy to Azure Static Web Apps
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: out
